name: Bug Report
description: Report a bug in the medallion pipeline
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.
        
  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      description: Which medallion layer is affected?
      options:
        - Bronze (ingestion)
        - Silver (transformation)
        - Gold (analytics)
        - Common utilities
        - CI/CD
        - Multiple layers
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run notebook '...'
        2. With data '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error messages or logs
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Development (dev)
        - Test
        - Production
        - Local
    validations:
      required: true

  - type: input
    id: spark-version
    attributes:
      label: Spark Version
      placeholder: e.g., 14.3.x-scala2.12

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
