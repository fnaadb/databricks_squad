# Development Environment Configuration

environment: dev
debug: true

# Catalog settings
catalog:
  name: squad_dev
  create_if_not_exists: true

# Schema settings
schemas:
  bronze: bronze
  silver: silver
  gold: gold

# Storage paths (relative to catalog root)
storage:
  raw_landing: /Volumes/squad_dev/raw/landing
  bronze_checkpoint: /Volumes/squad_dev/bronze/checkpoints
  silver_checkpoint: /Volumes/squad_dev/silver/checkpoints

# Compute settings
compute:
  cluster_type: interactive
  num_workers: 1
  node_type: Standard_DS3_v2
  spark_version: "14.3.x-scala2.12"
  autoscale:
    enabled: false

# Processing settings
processing:
  batch_size: 10000
  max_files_per_trigger: 10
  trigger_interval: "10 seconds"

# Data quality thresholds
quality:
  null_threshold_pct: 5.0
  duplicate_threshold_pct: 1.0
  quarantine_enabled: true

# Logging
logging:
  level: DEBUG
  structured: true
  include_spark_logs: true

# Feature flags
features:
  streaming_enabled: false
  liquid_clustering: false
  auto_optimize: true
