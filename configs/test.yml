# Test Environment Configuration

environment: test
debug: false

# Catalog settings
catalog:
  name: squad_test
  create_if_not_exists: true

# Schema settings
schemas:
  bronze: bronze
  silver: silver
  gold: gold

# Storage paths
storage:
  raw_landing: /Volumes/squad_test/raw/landing
  bronze_checkpoint: /Volumes/squad_test/bronze/checkpoints
  silver_checkpoint: /Volumes/squad_test/silver/checkpoints

# Compute settings
compute:
  cluster_type: job
  num_workers: 2
  node_type: Standard_DS3_v2
  spark_version: "14.3.x-scala2.12"
  autoscale:
    enabled: true
    min_workers: 1
    max_workers: 4

# Processing settings
processing:
  batch_size: 50000
  max_files_per_trigger: 50
  trigger_interval: "30 seconds"

# Data quality thresholds
quality:
  null_threshold_pct: 2.0
  duplicate_threshold_pct: 0.5
  quarantine_enabled: true

# Logging
logging:
  level: INFO
  structured: true
  include_spark_logs: false

# Feature flags
features:
  streaming_enabled: true
  liquid_clustering: false
  auto_optimize: true
